<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rooms Game</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #0a0a0a;
        overflow: hidden;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }

      #canvas-container {
        width: 100vw;
        height: 100vh;
        position: relative;
      }

      /* ── Loading Screen ── */
      #loading-screen {
        position: fixed;
        inset: 0;
        background: #0a0a0a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        z-index: 100;
        transition: opacity 0.6s ease;
      }

      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loading-title {
        color: #fff;
        font-size: 28px;
        font-weight: 300;
        letter-spacing: 6px;
        text-transform: uppercase;
      }

      .progress-bar-track {
        width: 280px;
        height: 2px;
        background: rgba(255,255,255,0.1);
        border-radius: 2px;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        background: #fff;
        border-radius: 2px;
        width: 0%;
        transition: width 0.3s ease;
      }

      .loading-label {
        color: rgba(255,255,255,0.4);
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* ── HUD ── */
      #hud {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 12px;
        z-index: 10;
      }

      .hud-btn {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        color: #fff;
        padding: 10px 28px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: background 0.2s;
        backdrop-filter: blur(8px);
      }

      .hud-btn:hover {
        background: rgba(255,255,255,0.18);
      }

      .hud-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      #room-counter {
        position: fixed;
        top: 24px;
        right: 24px;
        color: rgba(255,255,255,0.5);
        font-size: 13px;
        letter-spacing: 2px;
        text-transform: uppercase;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loading-title">Загрузка</div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="loading-label" id="loading-label">Инициализация…</div>
    </div>

    <div id="canvas-container"></div>

    <!-- <div id="room-counter">Room <span id="room-index">1</span> / 20</div> -->

    <!-- <div id="hud">
      <button class="hud-btn" id="btn-prev">← Prev</button>
      <button class="hud-btn" id="btn-next">Next →</button>
    </div> -->

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
